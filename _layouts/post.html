---
layout: default
---
<article class="blog-post-content">
  <header class="post-header">
    <div class="post-date">{{ page.date | date: "%d %B, %Y" }}</div>
    <h1>{{ page.title }}</h1>
  </header>
  
  <div class="post-body">
    {{ content }}
  </div>
  
  <footer class="post-footer">
    <a href="/blog.html" class="btn-back">← Terug naar overzicht</a>
  </footer>
</article>
